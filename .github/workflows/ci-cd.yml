name: KigaliCraft CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # ───────────── BUILD & TEST ─────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm install

      - name: Seed test database
        working-directory: ./backend
        run: node seed.js

      - name: Start server in background
        working-directory: ./backend
        run: |
          node server.js &
          sleep 3
        env:
          PORT: 5000

      - name: Run API tests
        working-directory: ./backend
        run: node test/api.test.js
        env:
          TEST_URL: http://localhost:5000

      - name: Lint check (basic syntax validation)
        working-directory: ./backend
        run: node -c server.js && node -c seed.js

  # ───────────── DOCKER BUILD ─────────────
  docker-build:
    name: Docker Build & Verify
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: kigalicraft:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker container starts correctly
        run: |
          docker run -d -p 5000:5000 --name kigalicraft-test kigalicraft:latest
          sleep 8
          curl --fail http://localhost:5000/api/health || (docker logs kigalicraft-test && exit 1)
          docker stop kigalicraft-test
          docker rm kigalicraft-test

  # ───────────── DEPLOY (placeholder for production deployment) ─────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-and-test, docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deployment notice
        run: |
          echo "✅ Build and tests passed."
          echo "🚀 Ready for deployment to Render / Railway / Fly.io / Vercel."
          echo "Configure your deployment platform's auto-deploy from this branch,"
          echo "or add platform-specific deploy steps here (e.g. Render API deploy hook)."

      # Example: trigger Render deploy hook (uncomment and add secret RENDER_DEPLOY_HOOK_URL)
      # - name: Trigger Render Deploy
      #   run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
